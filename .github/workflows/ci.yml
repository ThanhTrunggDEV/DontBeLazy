name: CI

on:
  pull_request:
    branches: [ master ]
  push:
    branches: [ master ]

jobs:
  build:
    name: Build & Test
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore DontBeLazy.slnx

      - name: Build
        run: dotnet build DontBeLazy.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test DontBeLazy.slnx --no-build --configuration Release --verbosity minimal
