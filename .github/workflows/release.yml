name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write   # needed to create GitHub Release

jobs:
  build-and-release:
    name: Build & Release
    runs-on: windows-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for changelog

      # ── 2. Setup .NET 9 ────────────────────────────────────────
      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      # ── 3. Extract version from tag (strip leading 'v') ───────
      - name: Extract version
        id: ver
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"            # e.g. v1.2.3
          VER="${TAG#v}"                      # e.g. 1.2.3
          echo "tag=$TAG"   >> "$GITHUB_OUTPUT"
          echo "version=$VER" >> "$GITHUB_OUTPUT"

      # ── 4. Restore ────────────────────────────────────────────
      - name: Restore
        run: dotnet restore DontBeLazy.slnx

      # ── 5. Publish — win-x64 self-contained single file ───────
      - name: Publish
        run: |
          dotnet publish src/DontBeLazy.WPF/DontBeLazy.WPF.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:Version=${{ steps.ver.outputs.version }} `
            -p:EnableCompressionInSingleFile=true `
            --output publish/

      # ── 6. Package into zip ────────────────────────────────────
      - name: Create zip
        shell: pwsh
        run: |
          $ver = "${{ steps.ver.outputs.version }}"
          Compress-Archive `
            -Path publish/* `
            -DestinationPath "DontBeLazy-$ver-win-x64.zip" `
            -Force

      # ── 7. Generate release notes from CHANGELOG.md ───────────
      - name: Extract changelog section
        id: notes
        shell: pwsh
        run: |
          $tag  = "${{ steps.ver.outputs.tag }}"
          $ver  = "${{ steps.ver.outputs.version }}"
          $cl   = Get-Content CHANGELOG.md -Raw -ErrorAction SilentlyContinue
          # Extract the block between this version header and the next
          if ($cl -match "(?s)## \[$ver\][^\n]*\n(.+?)(?=\n## \[|\z)") {
            $notes = $Matches[1].Trim()
          } else {
            $notes = "See [CHANGELOG.md](CHANGELOG.md) for details."
          }
          # Write to file to avoid multiline output issues
          $notes | Out-File -FilePath release_notes.md -Encoding utf8

      # ── 8. Create GitHub Release ───────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: "Don't Be Lazy ${{ steps.ver.outputs.tag }}"
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(steps.ver.outputs.tag, '-') }}
          files: |
            DontBeLazy-${{ steps.ver.outputs.version }}-win-x64.zip
