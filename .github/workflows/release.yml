name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & Release
    runs-on: windows-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Setup .NET 9 ────────────────────────────────────────
      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      # ── 3. Extract version from tag ────────────────────────────
      - name: Extract version
        id: ver
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VER="${TAG#v}"
          echo "tag=$TAG"     >> "$GITHUB_OUTPUT"
          echo "version=$VER" >> "$GITHUB_OUTPUT"

      # ── 4. Restore ─────────────────────────────────────────────
      - name: Restore
        run: dotnet restore DontBeLazy.slnx

      # ── 5. Publish — win-x64 self-contained single file ────────
      - name: Publish
        shell: pwsh
        run: |
          dotnet publish src/DontBeLazy.WPF/DontBeLazy.WPF.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:EnableCompressionInSingleFile=true `
            -p:Version="${{ steps.ver.outputs.version }}" `
            --output publish/

      # ── 6. Install WiX v4 ──────────────────────────────────────
      - name: Install WiX
        run: dotnet tool install --global wix --version 4.*

      # ── 7. Add WiX UI extension ────────────────────────────────
      - name: Add WiX UI extension
        run: wix extension add --global WixToolset.UI.wixext

      # ── 8. Build MSI ───────────────────────────────────────────
      - name: Build MSI
        shell: pwsh
        run: |
          $ver = "${{ steps.ver.outputs.version }}"
          wix build installer/Product.wxs `
            -ext WixToolset.UI.wixext `
            -d Version="$ver" `
            -d PublishDir="publish/" `
            -o "DontBeLazy-$ver-win-x64.msi" `
            -arch x64

      # ── 9. Package portable zip ────────────────────────────────
      - name: Create portable zip
        shell: pwsh
        run: |
          $ver = "${{ steps.ver.outputs.version }}"
          Compress-Archive `
            -Path publish/* `
            -DestinationPath "DontBeLazy-$ver-win-x64-portable.zip" `
            -Force

      # ── 10. Generate release notes ─────────────────────────────
      - name: Extract changelog section
        id: notes
        shell: pwsh
        run: |
          $ver = "${{ steps.ver.outputs.version }}"
          $cl  = Get-Content CHANGELOG.md -Raw -ErrorAction SilentlyContinue
          if ($cl -match "(?s)## \[$ver\][^\n]*\n(.+?)(?=\n## \[|\z)") {
            $notes = $Matches[1].Trim()
          } else {
            $notes = "See [CHANGELOG.md](CHANGELOG.md) for details."
          }
          $notes | Out-File -FilePath release_notes.md -Encoding utf8

      # ── 11. Create GitHub Release ──────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: "Don't Be Lazy ${{ steps.ver.outputs.tag }}"
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(steps.ver.outputs.tag, '-') }}
          files: |
            DontBeLazy-${{ steps.ver.outputs.version }}-win-x64.msi
            DontBeLazy-${{ steps.ver.outputs.version }}-win-x64-portable.zip
